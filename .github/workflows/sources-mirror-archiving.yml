# Automated archiving of source codes repository to Bitbucket remote backup instance
name: Test Plan Assets Archiving
run-name: ARCHIVING - Source codes backup update
on:
  push:
    # execution when ...
    branches:
      - 'feature*'
      - 'main'
      - 'integration'
      - 'staging'
  delete:
    # execution when ...
    branches:
      - 'feature*'
      - 'main'
      - 'integration'
      - 'staging'

# The archiging stage workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  mirror_repository_contents:
    name: Backup repository contents to AWS S3
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Read reusable environment variables about current test plans project
        if: ${{ env.TAG_VERSION == '' }}
        uses: FranzDiebold/github-env-vars-action@v2

      - name: Checkout source codes from branch
        id: checkout_step
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          token: ${{ github.token }}
          ref: ${{ inputs.branch_name }}
          fetch-depth: 0 # <-- clone with complete history

      # See https://github.com/aws-actions/configure-aws-credentials?tab=readme-ov-file#oidc-configuration-details
      # Get access to AWS resources using an IAM Role
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: 'arn:aws:iam::974410204560:role/github-repository-archiver'
          aws-region: 'eu-west-3-an'
      - name: Additional steps
        run: |
          # Your commands that require AWS credentials
          aws sts get-caller-identity

      - name: Push repository timestamped backup to AWS S3 bucket
        uses: fredydlemus/s3-backup@v1
        with:
          target-bucket: 'amzn-s3-cybnity-github-mirror-bucket-974410204560-eu-west-3-an' # Bucket name where to store repository mirrored files (backup)
          bucket-region: 'eu-west-3-an' # The WAS region where the S3 bucket is located
          role-arn: 'arn:aws:iam::974410204560:role/github-repository-archiver' # The ARN of the IAM role to assume for S3 access
          oidc-audience: 'sts.amazonaws.com' # The audience value for the OIDC token
          backup-prefix: 'quality-control-plans-backup' # Prefix for the backup file name
