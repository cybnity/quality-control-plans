      #  with:
      #      username: ${{ secrets.BITBUCKET_USERNAME }}
      #      spacename: ${{ secrets.BITBUCKET_WORKSPACE_NAME }}
      #      repository: $CI_REPOSITORY_NAME
      #      password: ${{ secrets.BITBUCKET_API_REPO_TOKEN }}
